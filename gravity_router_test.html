<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gravity Router Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background-color: #f2f3f5;
        margin: 0;
        padding: 20px;
        color: #333;
    }
    .test-section {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .test-title {
        font-size: 14px;
        font-weight: bold;
        color: #666;
        margin-bottom: 12px;
    }
    .btn {
        background: #000;
        color: #fedaa3;
        border: none;
        border-radius: 60px;
        padding: 14px 20px;
        font-size: 15px;
        font-weight: bold;
        width: 100%;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active {
        opacity: 0.8;
        transform: scale(0.98);
    }
    textarea {
        width: 100%;
        height: 100px;
        padding: 12px;
        box-sizing: border-box;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 16px;
        resize: none;
        outline: none;
    }
    textarea:focus {
        border-color: #ffaa00;
    }
    /* 画像化されるエリアの装飾 */
    #capture-area {
        padding: 15px;
        background: #ffffff;
        border: 2px dashed #ccc;
        border-radius: 12px;
        margin-bottom: 12px;
    }
</style>
</head>
<body>

    <div class="test-section">
        <div class="test-title">プロフィール画面を開く機能</div>
        <button class="btn" onclick="GravityRouter.openProfile('13277755')">GRAVITY【公式】を開く</button>
    </div>

    <div class="test-section">
        <div class="test-title">惑星画面を開く機能</div>
        <button class="btn" onclick="GravityRouter.openStar('17638')">AIゲーム工房を開く</button>
    </div>

    <div class="test-section">
        <div class="test-title">投稿画面を開く機能</div>
        <button class="btn" onclick="GravityRouter.openFeed('9_41721838')">7/11 Fall Grasリリースの投稿を開く</button>
    </div>

    <div class="test-section">
        <div class="test-title">質問ひろばを開く機能</div>
        <button class="btn" onclick="GravityRouter.openQuestion('147853')">テスト用に投稿した質問を開く</button>
    </div>

    <div class="test-section">
        <div class="test-title">投稿に文字を引用する機能</div>
        <button class="btn" onclick="createPostTextOnly()">投稿に引用する</button>
    </div>

    <div class="test-section">
        <div class="test-title">投稿に文字と画像を引用する機能</div>
        <div id="capture-area">
            <textarea id="post-text-input" placeholder="ここにテキストを入力してください">テスト投稿です！
こんな感じで引用できるよ！</textarea>
        </div>
        <button class="btn" id="capture-btn" onclick="createPostWithImageCapture()">投稿画面を開く</button>
    </div>

<script>
// iOS専用 ネイティブルーティング処理
window.GravityRouter = {
    _sendToApp: function(payloadStr) {
        const encodedPayload = encodeURIComponent(payloadStr);
        const deepLink = "slme://internal?type=5&ani=1&url=" + encodeURIComponent(encodedPayload);

        try {
            window.top.location.href = deepLink;
        } catch (e) {
            let i = document.createElement('iframe');
            i.style.cssText = 'position:absolute;width:0;height:0;opacity:0';
            i.src = deepLink;
            document.body.appendChild(i);
            setTimeout(function() { i.remove(); }, 5000);
        }
    },
    openProfile: function(userId) {
        const paramObj = { uid: userId, selectedIndex: 0, web_url: "https://www.gravity.place/user/" + userId, s: "web", b: "user" };
        this._sendToApp("usercenter?0=" + JSON.stringify(paramObj));
    },
    openStar: function(starId) {
        const paramObj = { starId: starId, s: "web", b: "star", web_url: "https://www.gravity.place/star/" + starId };
        this._sendToApp("stardetail?0=" + JSON.stringify(paramObj));
    },
    openFeed: function(feedId) {
        const paramObj = { id: feedId, s: "web", b: "feed", web_url: "https://www.gravity.place/detail/" + feedId };
        this._sendToApp("feeddetail?0=" + JSON.stringify(paramObj));
    },
    openQuestion: function(questionId) {
        const paramObj = { qid: questionId, s: "web", b: "ask_feed", selectedIndex: 0, web_url: "https://www.gravity.place/ask-feed/" + questionId };
        this._sendToApp("hotquestiondetail?0=" + JSON.stringify(paramObj));
    },
    createPost: function(text) {
        const paramObj = { s: "web", b: "makefeed", text: text };
        this._sendToApp("makefeed?0=" + JSON.stringify(paramObj));
    },
    createPostWithImage: function(text, base64Image) {
        window.parent.postMessage({ type: 'shareImage', image: base64Image }, '*');
        const paramObj = { s: "web", b: "makefeed", text: text };
        const self = this;
        // 画像の受け渡しが完了するまで0.5秒待機してから投稿画面を開く
        setTimeout(function() {
            self._sendToApp("makefeed?0=" + JSON.stringify(paramObj));
        }, 500);
    }
};

// 5の機能呼び出し用
function createPostTextOnly() {
    const text = "このAIゲーム楽しいよ、是非遊んでみて\nhttps://www.gravity.place/share/ugcGame?id=43660";
    GravityRouter.createPost(text);
}

// 6の機能呼び出し用
function createPostWithImageCapture() {
    const captureArea = document.getElementById('capture-area');
    const textArea = document.getElementById('post-text-input');
    const textValue = textArea.value;
    const btn = document.getElementById('capture-btn');
    
    // ボタンのテキストを変更して処理中であることを示す
    const originalText = btn.innerText;
    btn.innerText = "画像を生成して通信中...";
    btn.disabled = true;

    // テキスト入力欄のエリアをキャプチャする
    html2canvas(captureArea, {
        scale: 2, // 高画質化
        backgroundColor: "#ffffff",
        useCORS: true
    }).then(function(canvas) {
        const base64Image = canvas.toDataURL('image/png');
        
        // 生成した画像とテキストをルーターに渡す
        GravityRouter.createPostWithImage(textValue, base64Image);
        
        // 処理完了後にボタンを元に戻す
        setTimeout(function() {
            btn.innerText = originalText;
            btn.disabled = false;
        }, 1000);

    }).catch(function(err) {
        alert("画像の生成に失敗しました");
        btn.innerText = originalText;
        btn.disabled = false;
    });
}
</script>
</body>
</html>
